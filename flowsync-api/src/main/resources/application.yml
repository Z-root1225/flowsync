server:
  port: 8080

spring:
  application:
    name: flowsync-api
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/flowsync_simple?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:  # 根据本地 MySQL 密码调整，默认为 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名自动映射
  global-config:
    db-config:
      id-type: auto # 主键自增
      table-underline: true # 数据库表名下划线映射

# 阿里云千问 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:} # 优先读取系统环境变量 DASHSCOPE_API_KEY，避免密钥上传到 Git 泄露

